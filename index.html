<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Maravibewear — Catálogo online">
  <title>Maravibewear | Tienda Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Overlay del carrito -->
  <div class="cart-overlay" id="cartOverlay" aria-hidden="true"></div>

  <!-- Header Original -->
  <header class="header">
    <div class="header__inner container">
      <a href="#" class="header__logo" aria-label="Maravibewear — Inicio">
        <!-- Reemplaza TU_ID_AQUI por el ID de Google Drive de tu logo, o usa image_a5281a.png -->
        <img src="https://drive.google.com/thumbnail?id=TU_ID_AQUI&sz=w1000" alt="Maravibewear" class="header__logo-img">
      </a>

      <nav class="header__nav" aria-label="Navegación principal">
        <a href="#productos" class="header__nav-link">Productos</a>
        <a href="#contacto" class="header__nav-link">Contacto</a>
      </nav>

      <button class="cart-toggle" id="cartToggle" aria-label="Abrir carrito">
        Carrito (<span id="cartBadge">0</span>)
      </button>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="main">
    <section id="productos" class="container">
      
      <!-- Contenedor de Carga con Animación Original -->
      <div id="loadingState" class="state loading-container">
        <div class="spinner"></div>
        <p>Cargando productos...</p>
      </div>

      <!-- Contenedor de Error -->
      <div id="errorState" class="state" hidden>
        <p>Error al cargar.</p>
        <button onclick="location.reload()" class="btn btn--secondary">Reintentar</button>
      </div>

      <!-- Filtros (Opcional) -->
      <div id="filtersSection" hidden>
        <div id="categoryFilters" class="filters"></div>
      </div>

      <!-- Grilla de Productos -->
      <div id="productsGrid" class="products-grid" hidden></div>
      <div id="emptyState" class="state" hidden>No hay productos disponibles en esta categoría.</div>

    </section>
  </main>

  <!-- Modal de Producto -->
  <div class="modal-overlay" id="productModal" hidden>
    <div class="modal-content">
      <button class="modal-close" id="closeModal" aria-label="Cerrar">&times;</button>
      <div class="modal-body">
        <div class="modal-gallery">
          <img id="modalMainImg" src="" alt="Producto" class="modal-main-img">
          <div class="modal-thumbs" id="modalThumbs"></div>
        </div>
        <div class="modal-info">
          <h2 id="modalTitle" class="modal-title"></h2>
          <p id="modalDesc" class="modal-desc"></p>
          
          <div class="modal-variants">
            <div class="variant-group">
              <label>Tipo de compra:</label>
              <div id="modalPrices" class="radio-group"></div>
            </div>
            <div class="variant-group" id="colorGroup">
              <label>Color:</label>
              <select id="modalColor" class="variant-select"></select>
            </div>
            <div class="variant-group" id="sizeGroup">
              <label>Talle:</label>
              <select id="modalSize" class="variant-select"></select>
            </div>
          </div>

          <div class="modal-actions">
            <div class="qty-selector">
              <button id="modalQtyMinus">&minus;</button>
              <span id="modalQtyVal">1</span>
              <button id="modalQtyPlus">&plus;</button>
            </div>
            <button id="modalAddToCart" class="btn btn--primary">Agregar al carrito</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Original -->
  <footer class="footer">
    <div class="container footer__inner">
      <div>
        <img src="https://drive.google.com/thumbnail?id=TU_ID_AQUI&sz=w1000" alt="Maravibewear" class="footer__logo-img">
        <p class="footer__tagline">Lencería y comodidad para tu día a día.</p>
      </div>
    </div>
    <div class="footer__bottom container">
      <p>&copy; 2026 Maravibewear. Todos los derechos reservados.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
